services:
  nginx:
    build: .
    image: heartexlabs/label-studio:latest
    restart: unless-stopped
    ports:
      - "8080:8085"
      - "8081:8086"
    depends_on:
      - app
    environment:
      - LABEL_STUDIO_HOST=${LABEL_STUDIO_HOST:-}
    #   Optional: Specify SSL termination certificate & key
    #   Just drop your cert.pem and cert.key into folder 'deploy/nginx/certs'
    #      - NGINX_SSL_CERT=/certs/cert.pem
    #      - NGINX_SSL_CERT_KEY=/certs/cert.key
    volumes:
      - ./mydata:/label-studio/data:rw
      - ./deploy/nginx/certs:/certs:ro
    #   Optional: Override nginx default conf
    #      - ./deploy/my.conf:/etc/nginx/nginx.conf
    command: nginx

  # 标注服：Web + API，导出后把训练任务入队 Redis；不需要 GPU
  app:
    stdin_open: true
    tty: true
    build: .
    image: heartexlabs/label-studio:latest
    restart: unless-stopped
    expose:
      - "8000"
    depends_on:
      - db
      - redis
    environment:
      - DJANGO_DB=default
      - POSTGRE_NAME=postgres
      - POSTGRE_USER=postgres
      - POSTGRE_PASSWORD=
      - POSTGRE_PORT=5432
      - POSTGRE_HOST=db
      - LABEL_STUDIO_HOST=${LABEL_STUDIO_HOST:-}
      - JSON_LOG=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TRAINING_EXECUTOR=${TRAINING_EXECUTOR:-rq}
      - TRAINING_QUEUE=${TRAINING_QUEUE:-training}
      - TRAINING_DATA_MODE=${TRAINING_DATA_MODE:-shared}
      - TRAINING_WORKER_TOKEN=${TRAINING_WORKER_TOKEN:-}
      - TRAINING_SSH_HOST=${TRAINING_SSH_HOST:-}
      - TRAINING_SSH_USER=${TRAINING_SSH_USER:-root}
      - TRAINING_SSH_PORT=${TRAINING_SSH_PORT:-22}
      - TRAINING_SSH_KEY=${TRAINING_SSH_KEY:-}
      - TRAINING_SSH_REMOTE_DATA=${TRAINING_SSH_REMOTE_DATA:-}
      - TRAINING_ANNOTATION_DATA_DIR=${TRAINING_ANNOTATION_DATA_DIR:-/label-studio/data}
      - CV_ULTRA_PATH=/label-studio/cv-ultralytics
    #      - LOG_LEVEL=DEBUG
    volumes:
      - ./mydata:/label-studio/data:rw
      - ./cv-ultralytics:/label-studio/cv-ultralytics:rw
    command: label-studio-uwsgi

  # 训练服 Worker：消费 training 队列；需要 GPU + 与 app 共享 mydata / cv-ultralytics
  training-worker:
    build: .
    image: heartexlabs/label-studio:latest
    restart: unless-stopped
    depends_on:
      - db
      - redis
      - app
    environment:
      - DJANGO_DB=default
      - POSTGRE_NAME=postgres
      - POSTGRE_USER=postgres
      - POSTGRE_PASSWORD=
      - POSTGRE_PORT=5432
      - POSTGRE_HOST=db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TRAINING_QUEUE=${TRAINING_QUEUE:-training}
      - TRAINING_DATA_MODE=${TRAINING_DATA_MODE:-shared}
      - TRAINING_WORKER_TOKEN=${TRAINING_WORKER_TOKEN:-}
      - TRAINING_ANNOTATION_URL=${TRAINING_ANNOTATION_URL:-}
      - CV_ULTRA_PATH=/label-studio/cv-ultralytics
      - JSON_LOG=1
    volumes:
      - ./mydata:/label-studio/data:rw
      - ./cv-ultralytics:/label-studio/cv-ultralytics:rw
    command: >
      python3 /label-studio/label_studio/manage.py rqworker
      ${TRAINING_QUEUE:-training}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  redis:
    image: redis:7-alpine
    hostname: redis
    restart: unless-stopped
    volumes:
      - ${REDIS_DATA_DIR:-./redis-data}:/data

  db:
    image: pgautoupgrade/pgautoupgrade:13-alpine
    hostname: db
    restart: unless-stopped
    # Optional: Enable TLS on PostgreSQL
    # Just drop your server.crt and server.key into folder 'deploy/pgsql/certs'
    # NOTE: Both files must have permissions u=rw (0600) or less
    #    command: >
    #      -c ssl=on
    #      -c ssl_cert_file=/var/lib/postgresql/certs/server.crt
    #      -c ssl_key_file=/var/lib/postgresql/certs/server.key
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
      - POSTGRES_USER=postgres
    volumes:
      - ${POSTGRES_DATA_DIR:-./postgres-data}:/var/lib/postgresql/data
      - ./deploy/pgsql/certs:/var/lib/postgresql/certs:ro
